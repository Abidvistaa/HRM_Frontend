<div class="container mt-4 admin-container">

    <!-- HEADER -->
    <div class="header">
        <h2>Admin - Create New User</h2>
        <p class="subtitle">Only administrators can register and manage system users</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <!-- ROLE -->
        <div class="mb-3 form-group">
            <label>Role</label>

            <small class="text-danger"
                *ngIf="registerForm.get('roleId')?.invalid && registerForm.get('roleId')?.touched">
                Required
            </small>

            <select class="form-control" formControlName="roleId">
                <option value="">Select Role</option>

                <option *ngFor="let role of roles" [value]="role.id">
                    {{ role.roleName }}
                </option>
            </select>
        </div>

        <!-- USERNAME -->
        <div class="mb-3 form-group">
            <label>User Name</label>

            <small class="text-danger"
                *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
                Required
            </small>

            <input
                type="text"
                class="form-control"
                formControlName="userName">

        </div>

        <!-- PASSWORD -->
        <div class="mb-3 form-group">
            <label>Password</label>
            
            <small class="text-danger"
                *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                Required
            </small>

            <input
                type="password"
                class="form-control"
                formControlName="password">
        </div>

        <!-- REGISTER BUTTON -->
        <button class="btn btn-primary mt-2" type="submit">
            Create User
        </button>

        <!-- SUCCESS MESSAGE -->
        <div class="alert alert-success mt-3" *ngIf="successMessage">
            {{ successMessage }}
        </div>

        <!-- ACTIONS -->
        <div class="admin-actions mt-4">

            <!-- LOGIN -->
            <a (click)="goToLoginPage()" class="action-link left-link">
                ← Login Page
            </a>

        </div>

    </form>

</div>
